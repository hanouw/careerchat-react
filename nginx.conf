server {
    listen 80; # 80번 포트로 들어오는 요청을 받습니다.

    location / {
        root   /usr/share/nginx/html; # React 빌드 파일이 위치할 곳입니다.
        index  index.html index.htm;
        # SPA 라우팅 설정: 파일을 못 찾으면 index.html을 보여줍니다.
        try_files $uri $uri/ /index.html;
    }

    # 보안을 위해 서버 버전을 숨깁니다.
    server_tokens off;
}